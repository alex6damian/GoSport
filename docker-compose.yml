services:
  postgres:
    image: postgres:15-alpine
    container_name: gosport-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes: 
      - postgres_data:/var/lib/postgresql/data
    networks: 
      - gosport-network
    restart: unless-stopped
    healthcheck:                              
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: gosport-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports: 
      - "${MINIO_PORT}:9000"
      - "${MINIO_CONSOLE_PORT}:9001"
    volumes:
      - minio_data:/data
    networks:
      - gosport-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  meilisearch:
    image: getmeili/meilisearch:latest
    container_name: gosport-meilisearch
    restart: unless-stopped
    ports:
      - "${MEILI_PORT}:${MEILI_PORT}"
    environment: 
      - MEILI_MASTER_KEY=${MEILI_MASTER_KEY}
      - MEILI_ENV=development
      - MEILI_NO_ANALYTICS=true
    volumes:  
      - meilisearch_data:/meilisearch_data
    networks:
      - gosport-network
    healthcheck:                                       
      test: ["CMD", "curl", "-f", "http://localhost:7700/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  backend: 
    build: 
      context: .
      dockerfile: ./backend/Dockerfile
    container_name: gosport-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      meilisearch:                                       
        condition: service_healthy
    environment: 
      DATABASE_URL: ${DATABASE_URL}
      BACKEND_PORT: ${BACKEND_PORT}
      JWT_SECRET: ${JWT_SECRET}
      SALT_KEY: ${SALT_KEY}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT}
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      MINIO_USE_SSL: ${MINIO_USE_SSL}
      MINIO_BUCKET_NAME: ${MINIO_BUCKET_NAME}           
      MEILI_URL: http://meilisearch:7700
      MEILI_KEY: ${MEILI_MASTER_KEY}
    ports:
      - "${BACKEND_PORT}:${BACKEND_PORT}"
    networks:
      - gosport-network
    healthcheck:                                         
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:${BACKEND_PORT}/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s                                   # Give backend 30s to start & run migrations
  
  video-worker:
    build:
      context: .
      dockerfile: worker/video_worker/Dockerfile
    container_name: gosport-video-worker
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT}
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      MINIO_USE_SSL: ${MINIO_USE_SSL}
      MINIO_BUCKET_NAME: ${MINIO_BUCKET_NAME} 
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      backend:                                          
        condition: service_healthy
    networks:
      - gosport-network

  rss-worker:
    build:
      context: .
      dockerfile: worker/rss_worker/Dockerfile
    container_name: gosport-rss-worker
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL}
      TZ: Europe/Bucharest
    depends_on:
      postgres:
        condition: service_healthy
      backend:
        condition: service_healthy
    networks:
      - gosport-network

volumes:
  postgres_data: 
  minio_data:
  meili_data:  

networks:
  gosport-network:
    driver: bridge